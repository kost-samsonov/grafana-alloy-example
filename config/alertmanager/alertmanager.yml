global:
  smtp_smarthost: 'mailhog:1025'   # MailHog в той же сети
  smtp_from: 'alertmanager@example.com'
  smtp_require_tls: false

route:
  group_by: ['alertname']
  group_wait: 10s
  group_interval: 10s
  repeat_interval: 1h
  receiver: 'email'

receivers:
  - name: 'email'
    email_configs:
      - to: 'admin@example.com'   # замените на реальный email (для теста можно оставить)
