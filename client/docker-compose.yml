version: '3.8'

services:
  alloy:
    image: grafana/alloy:latest
    container_name: alloy-client
    restart: unless-stopped
    environment:
      - HOSTNAME_FROM_HOST=$(hostname -f)
    volumes:
      - ./alloy/config.alloy:/etc/alloy/config.alloy
      - /var/log:/var/log:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
    ports:
      - "4317:4317"   # для приёма трейсов по gRPC от локальных приложений
      - "4318:4318"   # для приёма трейсов по HTTP
    command: run /etc/alloy/config.alloy
    # Если нужно ограничить потребление памяти, добавьте:
    # deploy:
    #   resources:
    #     limits:
    #       memory: 512M

  node_exporter:
    image: prom/node-exporter:latest
    container_name: node_exporter
    restart: unless-stopped
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--path.rootfs=/rootfs'
    ports:
      - "9100:9100"   # если нужно скрапить напрямую, но Alloy уже скрапит внутри сети
